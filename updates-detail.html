<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Detail — TeyvatJournal</title>
  <link rel="stylesheet" href="/src/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── Tokens ── */
    :root {
      --accent:        #f0c060;
      --accent-dim:    rgba(240,192,96,0.10);
      --accent-border: rgba(240,192,96,0.28);
      --surface:       rgba(255,255,255,0.04);
      --surface-2:     rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.08);
      --border-hi:     rgba(255,255,255,0.18);
      --text-1:        #f0ede8;
      --text-2:        #9ca3af;
      --text-3:        #5a6070;
      --bg:            #07080d;
      --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 26px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: pageFade 0.45s ease forwards;
    }

    body {
      cursor: url('/TeyvatJournal/assets/images/cursor.png') 4 2, auto;
    }
    button, a, input {
      cursor: url('/TeyvatJournal/assets/images/cursor.png') 4 2, auto !important;
    }

    @keyframes pageFade { to { opacity: 1; } }

    /* ── Progress bar ── */
    #progressBar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #fde68a);
      z-index: 9999;
      transition: width 0.08s linear;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0; z-index: 200;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(7,8,13,0.80);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .back-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      color: var(--text-2);
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      letter-spacing: 0.01em;
    }
    .back-pill:hover {
      background: var(--surface-2);
      border-color: var(--border-hi);
      color: var(--text-1);
    }

    .topbar-section {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-3);
    }

    /* ── Page layout ── */
    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 3.5rem 2rem 7rem;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      border-radius: var(--r-xl);
      overflow: hidden;
      aspect-ratio: 16/9;
      margin-bottom: 2rem;
      background: #111;
    }

    .hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .hero:hover img { transform: scale(1.04); }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(7,8,13,0.96) 0%,
        rgba(7,8,13,0.38) 42%,
        rgba(7,8,13,0.05) 100%
      );
    }

    /* Type badge */
    .hero-type-badge {
      position: absolute;
      top: 1.25rem; left: 1.25rem;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px;
      border-radius: 9999px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid currentColor;
      backdrop-filter: blur(8px);
    }
    .hero-type-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .type-banner      { color: #f0c060; background: rgba(240,192,96,0.12); }
    .type-exploration { color: #4ade80; background: rgba(74,222,128,0.10); }
    .type-meta        { color: #c084fc; background: rgba(192,132,252,0.10); }
    .type-event       { color: #60a5fa; background: rgba(96,165,250,0.10); }

    /* Live pill */
    .hero-live {
      position: absolute;
      top: 1.25rem; right: 1.25rem;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px;
      border-radius: 9999px;
      background: rgba(74,222,128,0.15);
      border: 1px solid rgba(74,222,128,0.35);
      color: #4ade80;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
    }
    .hero-live .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 1.6s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* Title */
    .hero-title {
      position: absolute;
      bottom: 1.75rem; left: 1.75rem; right: 1.75rem;
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 700;
      line-height: 1.25;
      color: #fff;
      text-shadow: 0 3px 24px rgba(0,0,0,0.6);
    }

    /* ── Meta row ── */
    .meta-row {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .tag-chip {
      padding: 4px 13px;
      border-radius: 9999px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em;
    }

    .char-chip {
      padding: 3px 10px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-2);
      font-size: 11px; font-weight: 600;
    }

    .meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-3);
    }

    .meta-text {
      font-size: 13px;
      color: var(--text-3);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* ── Lead blockquote ── */
    .lead-quote {
      position: relative;
      padding: 1rem 1.25rem 1rem 1.5rem;
      border-left: 2px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-dim), transparent);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      margin-bottom: 2rem;
    }
    .lead-quote p {
      font-size: 1.08rem;
      font-style: italic;
      color: var(--text-2);
      line-height: 1.75;
    }

    /* ── Article body ── */
    .article-body {
      font-size: 1.0625rem;
      line-height: 1.9;
      color: #bec5cf;
      letter-spacing: 0.015em;
    }
    .article-body p + p { margin-top: 1.3rem; }

    /* ── Info strip ── */
    .info-strip {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 8px 18px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      margin-top: 2.5rem;
      font-size: 13px;
    }
    .info-strip .accent-text { color: var(--accent); font-weight: 600; }
    .info-strip .muted { color: var(--text-3); }

    /* ── Section heading ── */
    .section-heading {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.95rem; font-weight: 600;
      color: var(--text-1);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ── Related grid ── */
    .related-section { margin-top: 4rem; }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .related-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: border-color 0.25s, transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.25s;
    }
    .related-card:hover {
      border-color: var(--border-hi);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .related-card-img {
      height: 138px; overflow: hidden;
    }
    .related-card-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.5s ease;
    }
    .related-card:hover .related-card-img img { transform: scale(1.07); }

    .related-card-body { padding: 1rem 1.1rem 1.25rem; }

    .related-card-cat {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .related-card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem; font-weight: 600;
      color: var(--text-1); line-height: 1.4;
      margin-bottom: 0.4rem;
      transition: color 0.2s;
    }
    .related-card:hover .related-card-title { color: var(--accent); }

    .related-card-desc {
      font-size: 0.78rem;
      color: var(--text-2); line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .related-card-cta {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      color: var(--accent);
      margin-top: 0.75rem;
      opacity: 0.7;
      transition: opacity 0.2s, gap 0.2s;
    }
    .related-card:hover .related-card-cta { opacity: 1; gap: 7px; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .topbar { padding: 0 1.25rem; }
      .page-wrap { padding: 2rem 1.25rem 5rem; }
      .hero-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div id="progressBar"></div>

  <nav class="topbar">
    <a href="index.html#version" class="back-pill">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Updates
    </a>
    <span class="topbar-section">Updates</span>
  </nav>

  <main class="page-wrap">
    <article id="updateArticle">
      <p style="color:var(--text-3); font-size:14px; padding: 4rem 0; text-align:center;">Loading…</p>
    </article>
  </main>

  <!-- Progress -->
  <script>
    window.addEventListener('scroll', () => {
      const h = document.body.scrollHeight - window.innerHeight;
      document.getElementById('progressBar').style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
    });
    function formatDate(str) {
      return new Date(str).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    }
    function readTime(text) {
      const w = (text || '').split(/\s+/).filter(Boolean).length;
      return Math.max(1, Math.ceil(w / 200)) + ' min read';
    }
    function getTypeClass(type) {
      return { banner:'type-banner', exploration:'type-exploration', meta:'type-meta', event:'type-event' }[type] || 'type-banner';
    }
  </script>

  <script type="module">
    import { updates } from './assets/js/updates.js';

    const id   = Number(new URLSearchParams(window.location.search).get('id'));
    const item = updates.find(u => u.id === id);
    const el   = document.getElementById('updateArticle');

    if (!item) {
      el.innerHTML = `
        <div style="text-align:center; padding:6rem 0;">
          <p style="color:var(--text-3); font-size:1rem; margin-bottom:1.5rem;">Update not found.</p>
          <a href="index.html" class="back-pill">← Go Home</a>
        </div>`;
    } else {
      document.title = `${item.title} — TeyvatJournal`;

      const paragraphs = (item.content || item.description || '')
        .split(/\n+/).filter(Boolean)
        .map(p => `<p>${p.trim()}</p>`).join('');

      // Related
      let related = updates.filter(u => u.id !== item.id && u.type === item.type);
      if (related.length < 3) {
        related = [...related, ...updates.filter(u => u.id !== item.id && !related.includes(u))];
      }
      const relatedItems = related.slice(0, 3);

      // Character chips
      const charChips = (item.characters || [])
        .map(c => `<span class="char-chip">${c}</span>`).join('');

      const livePill = item.status === 'active'
        ? `<span class="hero-live"><span class="pulse"></span>Live Now</span>` : '';

      el.innerHTML = `
        <!-- Hero -->
        <div class="hero">
          <img src="${item.image}" alt="${item.title}" loading="eager">
          <div class="hero-overlay"></div>
          <span class="hero-type-badge ${getTypeClass(item.type)}">${item.type}</span>
          ${livePill}
          <h1 class="hero-title">${item.title}</h1>
        </div>

        <!-- Meta -->
        <div class="meta-row">
          <span class="tag-chip">${item.category}</span>
          ${charChips}
          <span class="meta-dot"></span>
          <span class="meta-text">${formatDate(item.date)}</span>
          <span class="meta-dot"></span>
          <span class="meta-text">${readTime(item.content || item.description)}</span>
        </div>

        <!-- Lead -->
        <blockquote class="lead-quote"><p>${item.description}</p></blockquote>

        <hr class="divider">

        <!-- Body -->
        <div class="article-body">
          ${paragraphs || '<p style="color:var(--text-3); font-style:italic;">Full guide coming soon.</p>'}
        </div>

        <!-- Info strip -->
        <div class="info-strip">
          <span class="accent-text">${item.category}</span>
          <span class="meta-dot"></span>
          <span class="muted">${formatDate(item.date)}</span>
          <span class="meta-dot"></span>
          <span class="muted" style="text-transform:capitalize;">${item.type}</span>
          <span class="meta-dot"></span>
          <span class="muted">${readTime(item.content || item.description)}</span>
        </div>

        <!-- Related -->
        ${relatedItems.length > 0 ? `
        <div class="related-section">
          <p class="section-heading">Related Updates</p>
          <div class="related-grid">
            ${relatedItems.map(u => `
              <a href="updates-detail.html?id=${u.id}" class="related-card">
                <div class="related-card-img">
                  <img src="${u.image}" alt="${u.title}" loading="lazy">
                </div>
                <div class="related-card-body">
                  <p class="related-card-cat">${u.category}</p>
                  <p class="related-card-title">${u.title}</p>
                  <p class="related-card-desc">${u.description}</p>
                  <span class="related-card-cta">Read Guide →</span>
                </div>
              </a>`).join('')}
          </div>
        </div>` : ''}

        <hr class="divider" style="margin-top:3.5rem;">
        <a href="index.html#version" class="back-pill">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back to all updates
        </a>
      `;
    }
  </script>
</body>
</html>
