<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Detail — TeyvatJournal</title>
  <link rel="stylesheet" href="/src/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent:        #f0c060;
      --accent-dim:    rgba(240,192,96,0.10);
      --accent-border: rgba(240,192,96,0.28);
      --surface:       rgba(255,255,255,0.04);
      --surface-2:     rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.08);
      --border-hi:     rgba(255,255,255,0.18);
      --text-1:        #f0ede8;
      --text-2:        #9ca3af;
      --text-3:        #5a6070;
      --bg:            #07080d;
      --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 26px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
      animation: pageFade 0.45s ease forwards;
    }
    body { cursor: url('/TeyvatJournal/assets/images/cursor.png') 4 2, auto; }
    button, a, input { cursor: url('/TeyvatJournal/assets/images/cursor.png') 4 2, auto !important; }

    @keyframes pageFade { to { opacity: 1; } }

    /* ── Progress ── */
    #progressBar {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), #fde68a);
      z-index: 9999;
      transition: width 0.08s linear;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(7,8,13,0.80);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .back-pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      color: var(--text-2);
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .back-pill:hover { background: var(--surface-2); border-color: var(--border-hi); color: var(--text-1); }

    .topbar-section {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-3);
    }

    /* ── Layout ── */
    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 3.5rem 2rem 7rem;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      border-radius: var(--r-xl);
      overflow: hidden;
      aspect-ratio: 16/9;
      margin-bottom: 2rem;
      background: #111;
    }
    .hero img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .hero:hover img { transform: scale(1.04); }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(7,8,13,0.96) 0%,
        rgba(7,8,13,0.35) 42%,
        rgba(7,8,13,0.04) 100%
      );
    }

    .hero-badge {
      position: absolute; top: 1.25rem; left: 1.25rem;
      padding: 5px 13px;
      border-radius: 9999px;
      background: var(--accent);
      color: #1a1000;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .hero-title {
      position: absolute;
      bottom: 1.75rem; left: 1.75rem; right: 1.75rem;
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 700;
      line-height: 1.25;
      color: #fff;
      text-shadow: 0 3px 24px rgba(0,0,0,0.65);
    }

    /* ── Meta ── */
    .meta-row {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 10px; margin-bottom: 1.75rem;
    }

    .tag-chip {
      padding: 4px 13px;
      border-radius: 9999px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em;
    }

    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-3); }
    .meta-text { font-size: 13px; color: var(--text-3); }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ── Lead ── */
    .lead-quote {
      position: relative;
      padding: 1rem 1.25rem 1rem 1.5rem;
      border-left: 2px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-dim), transparent);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      margin-bottom: 2rem;
    }
    .lead-quote p {
      font-size: 1.08rem; font-style: italic;
      color: var(--text-2); line-height: 1.75;
    }

    /* ── Article ── */
    .article-body {
      font-size: 1.0625rem; line-height: 1.9;
      color: #bec5cf; letter-spacing: 0.015em;
    }
    .article-body p + p { margin-top: 1.3rem; }

    /* ── Section heading ── */
    .section-heading {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.95rem; font-weight: 600;
      color: var(--text-1);
      letter-spacing: 0.05em; text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .section-heading::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ── Gallery ── */
    .gallery-section { margin-top: 3rem; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .gallery-item {
      border-radius: var(--r-lg);
      overflow: hidden;
      aspect-ratio: 16/10;
      cursor: zoom-in !important;
      border: 1px solid var(--border);
      transition: border-color 0.25s, transform 0.3s;
    }
    .gallery-item:hover { border-color: var(--border-hi); transform: scale(1.02); }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.5s ease;
    }
    .gallery-item:hover img { transform: scale(1.08); }

    /* ── Related ── */
    .related-section { margin-top: 4rem; }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .related-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: border-color 0.25s, transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.25s;
    }
    .related-card:hover {
      border-color: var(--border-hi);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .related-card-img { height: 138px; overflow: hidden; }
    .related-card-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.5s ease;
    }
    .related-card:hover .related-card-img img { transform: scale(1.07); }

    .related-card-body { padding: 1rem 1.1rem 1.25rem; }

    .related-card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem; font-weight: 600;
      color: var(--text-1); line-height: 1.4;
      margin-bottom: 0.4rem;
      transition: color 0.2s;
    }
    .related-card:hover .related-card-title { color: var(--accent); }

    .related-card-desc {
      font-size: 0.78rem; color: var(--text-2); line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .related-card-cta {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      color: var(--accent); margin-top: 0.75rem;
      opacity: 0.7; transition: opacity 0.2s, gap 0.2s;
    }
    .related-card:hover .related-card-cta { opacity: 1; gap: 7px; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.95);
      align-items: center; justify-content: center;
      padding: 2rem;
      animation: lbFade 0.2s ease;
    }
    #lightbox.open { display: flex; }
    @keyframes lbFade { from { opacity: 0; } to { opacity: 1; } }

    #lightbox-img {
      max-width: 100%; max-height: 84vh;
      border-radius: var(--r-lg);
      object-fit: contain;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }

    .lb-btn {
      position: absolute;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.08); }

    #lightbox-close { top: 1.5rem; right: 1.5rem; font-size: 14px; }
    #lightbox-prev  { top: 50%; left: 1.5rem; transform: translateY(-50%); }
    #lightbox-next  { top: 50%; right: 1.5rem; transform: translateY(-50%); }

    #lightbox-counter {
      position: absolute; bottom: 1.5rem;
      font-size: 12px; color: rgba(255,255,255,0.4);
      font-family: 'Raleway', sans-serif;
      letter-spacing: 0.08em;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .topbar { padding: 0 1.25rem; }
      .page-wrap { padding: 2rem 1.25rem 5rem; }
      .hero-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div id="progressBar"></div>

  <nav class="topbar">
    <a href="index.html#news" class="back-pill">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to News
    </a>
    <span class="topbar-section">News</span>
  </nav>

  <main class="page-wrap">
    <article id="newsArticle">
      <p style="color:var(--text-3); font-size:14px; padding:4rem 0; text-align:center;">Loading…</p>
    </article>
  </main>

  <!-- Lightbox -->
  <div id="lightbox">
    <button id="lightbox-close" class="lb-btn">✕</button>
    <button id="lightbox-prev"  class="lb-btn">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button id="lightbox-next"  class="lb-btn">›</button>
    <span id="lightbox-counter"></span>
  </div>

  <script>
    window.addEventListener('scroll', () => {
      const h = document.body.scrollHeight - window.innerHeight;
      document.getElementById('progressBar').style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
    });
  </script>

  <script type="module">
    import { news } from './assets/js/news.js';

    const id   = Number(new URLSearchParams(window.location.search).get('id'));
    const item = news.find(n => n.id === id);
    const el   = document.getElementById('newsArticle');

    if (!item) {
      el.innerHTML = `
        <div style="text-align:center; padding:6rem 0;">
          <p style="color:var(--text-3); font-size:1rem; margin-bottom:1.5rem;">Post not found.</p>
          <a href="index.html#news" class="back-pill">← Back to News</a>
        </div>`;
    } else {
      document.title = `${item.title} — TeyvatJournal`;

      const paragraphs = item.content.trim().split('\n').filter(p => p.trim())
        .map(p => `<p>${p}</p>`).join('');

      const extraImages = (item.images || []).slice(1);

      const galleryHTML = extraImages.length > 0 ? `
        <div class="gallery-section">
          <hr class="divider">
          <p class="section-heading">Gallery</p>
          <div class="gallery-grid">
            ${extraImages.map((src, i) => `
              <div class="gallery-item" data-index="${i}" data-src="${src}">
                <img src="${src}" loading="lazy" alt="Gallery image ${i + 1}">
              </div>`).join('')}
          </div>
        </div>` : '';

      const related = news.filter(n => n.id !== item.id).slice(0, 3);

      const relatedHTML = related.length > 0 ? `
        <div class="related-section">
          <p class="section-heading">More News</p>
          <div class="related-grid">
            ${related.map(r => `
              <a href="news-detail.html?id=${r.id}" class="related-card">
                <div class="related-card-img">
                  <img src="${r.image}" alt="${r.title}" loading="lazy">
                </div>
                <div class="related-card-body">
                  <p class="related-card-title">${r.title}</p>
                  <p class="related-card-desc">${r.desc}</p>
                  <span class="related-card-cta">Read More →</span>
                </div>
              </a>`).join('')}
          </div>
        </div>` : '';

      el.innerHTML = `
        <div class="hero">
          <img src="${item.image}" alt="${item.title}">
          <div class="hero-overlay"></div>
          <span class="hero-badge">News</span>
          <h1 class="hero-title">${item.title}</h1>
        </div>

        <div class="meta-row">
          <span class="tag-chip">${item.category || 'Update'}</span>
          <span class="meta-dot"></span>
          <span class="meta-text">${item.date || 'Latest'}</span>
          ${extraImages.length > 0 ? `
            <span class="meta-dot"></span>
            <span class="meta-text">${extraImages.length + 1} images</span>` : ''}
        </div>

        <blockquote class="lead-quote"><p>${item.desc}</p></blockquote>

        <hr class="divider">

        <div class="article-body">${paragraphs}</div>

        ${galleryHTML}
        ${relatedHTML}

        <hr class="divider" style="margin-top:3.5rem;">
        <a href="index.html#news" class="back-pill">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back to all news
        </a>
      `;

      // ── Lightbox logic ──
      let curr = 0;
      const lightbox = document.getElementById('lightbox');
      const lbImg    = document.getElementById('lightbox-img');
      const lbCount  = document.getElementById('lightbox-counter');

      const open  = i => { curr = i; lbImg.src = extraImages[curr]; lbCount.textContent = `${curr+1} / ${extraImages.length}`; lightbox.classList.add('open'); document.body.style.overflow = 'hidden'; };
      const close = ()  => { lightbox.classList.remove('open'); document.body.style.overflow = ''; };

      document.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', () => open(Number(el.dataset.index)));
      });
      document.getElementById('lightbox-close').onclick = close;
      document.getElementById('lightbox-next').onclick  = () => open((curr + 1) % extraImages.length);
      document.getElementById('lightbox-prev').onclick  = () => open((curr - 1 + extraImages.length) % extraImages.length);
      lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowRight') open((curr + 1) % extraImages.length);
        if (e.key === 'ArrowLeft')  open((curr - 1 + extraImages.length) % extraImages.length);
      });
    }
  </script>
</body>
</html>
