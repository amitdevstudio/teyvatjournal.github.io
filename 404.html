<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="./assets/src/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --red: #c97070;
      --bg: #080810;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(201,169,110,0.2);
      --border-red: rgba(201,112,112,0.25);
      --text: #f0ead8;
      --muted: rgba(240,234,216,0.45);
      --dim: rgba(240,234,216,0.25);
    }

        /* FIXED GENSHIN CURSOR */
    body {
      cursor: url('./assets/images/cursor.png') 4 2, auto;
    }

    button,
    a,
    input {
      cursor: url('./assets/images/cursor.png') 4 2, auto !important;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,112,112,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(100,100,200,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 60%, rgba(201,169,110,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      padding: 2rem;
      text-align: center;
      animation: fadeUp 1s ease both;
    }

    /* Error badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.35rem 1rem;
      border: 1px solid var(--border-red);
      background: rgba(201,112,112,0.07);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s both;
    }
    .badge-dot {
      width: 5px;
      height: 5px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    .badge span {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.22em;
      color: var(--red);
      text-transform: uppercase;
    }

    /* 404 number + character stacked naturally */
    .error-stack {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .error-num {
      font-family: 'Cinzel', serif;
      font-size: clamp(5rem, 22vw, 8.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.05em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(201, 169, 110, 0.507);
      user-select: none;
      pointer-events: none;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s both;
      /* Pull the number and character closer together */
      margin-bottom: -1.5rem;
    }

    .char-wrap {
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.35s both;
    }
    .char-wrap::before {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 20px;
      background: radial-gradient(ellipse, rgba(201,112,112,0.25) 0%, transparent 70%);
      filter: blur(6px);
    }
    .char-wrap img {
      width: 130px;
      display: block;
      filter: drop-shadow(0 4px 20px rgba(201,112,112,0.15));
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-color: var(--border-red);
      border-radius: 2px;
      padding: 2.5rem 2rem 2rem;
      position: relative;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.55s both;
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-color: var(--red); border-width: 1px 0 0 1px; }
    .card::after  { bottom: -1px; right: -1px; border-color: var(--gold); border-width: 0 1px 1px 0; }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 1.2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.2rem 0;
      opacity: 0.35;
    }
    .divider span { flex: 1; height: 1px; background: var(--gold); }
    .divider i { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); }

    .quote {
      font-size: 1rem;
      color: var(--dim);
      font-style: italic;
      line-height: 1.7;
    }
    .quote strong { color: var(--muted); font-style: normal; font-weight: 400; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 1.8rem;
      padding: 0.7rem 1.8rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--bg); }
    .btn span { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <main class="container">

    <div class="badge">
      <div class="badge-dot"></div>
      <span>Error Encountered</span>
    </div>

    <div class="error-stack">
      <div class="error-num">404</div>
      <div class="char-wrap">
        <img src="assets/images/404.png" alt="404 Qiqi not found" loading="lazy" />
      </div>
    </div>

    <div class="card">
      <h1>Page Not Found</h1>
      <div class="divider"><span></span><i></i><span></span></div>

      <p class="quote">
        <strong>How about we explore the area ahead of us later?</strong><br/>
        The page you're looking for doesn't exist<br/>or may have been moved.
      </p>

      <a href="./index.html" class="btn"><span>Return Home</span></a>
    </div>

  </main>
</body>
</html>
