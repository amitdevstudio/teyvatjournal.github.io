  <script type="module">
    import { wallpapers } from './wallpaper.js';

    /* -------------------------
       Helpers
    ------------------------- */
    function formatNumber(num) {
      if (num >= 1_000_000) return (num / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (num >= 1_000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return num.toString();
    }

    function randomRange(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function toggleFullscreen(el) {
      if (!document.fullscreenElement) {
        el.requestFullscreen({ navigationUI: "hide" }).then(() => {
          if (el.tagName === "VIDEO") el.controls = false;
        });
      } else {
        document.exitFullscreen();
      }
    }


    function resizeAndDownloadImage(url, w, h, filename) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = url;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const ar = img.width / img.height, tar = w / h;
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (ar > tar) { sw = img.height * tar; sx = (img.width - sw) / 2; }
        else { sh = img.width / tar; sy = (img.height - sh) / 2; }
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
        canvas.toBlob(b => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(b); a.download = filename;
          document.body.appendChild(a); a.click(); a.remove();
        }, 'image/webp', 0.9);
      };
    }

    /* -------------------------
       Setup
    ------------------------- */
    const urlParams = new URLSearchParams(window.location.search);
    const currentUrl = urlParams.get('img');
    const currentTitle = urlParams.get('title');

    const previewWrapper = document.getElementById('previewWrapper');
    const wallpaperTitle = document.getElementById('wallpaperTitle');
    const originalDownload = document.getElementById('originalDownload');
    const autoDownloadResizeBtn = document.getElementById('autoDownloadResize');
    const previewBtn = document.getElementById('previewBtn');
    const tagsContainer = document.getElementById('main-tags');

    let currentWallpaper;

    // Find current wallpaper
    wallpapers.forEach(wp => {
      if (wp.images) wp.images.forEach(img => {
        if (img.url === currentUrl) currentWallpaper = { ...wp, currentFile: img, isLive: false };
      });
      if (wp.videos) wp.videos.forEach(v => {
        if (v.download === currentUrl || v.preview === currentUrl) currentWallpaper = { ...wp, currentFile: v, isLive: true };
      });
    });

    // Fallback: if no match found, search by title
    if (!currentWallpaper && currentTitle) {
      wallpapers.forEach(wp => {
        if (!currentWallpaper && wp.character === currentTitle) {
          // Use first available media
          if (wp.images && wp.images[0]) {
            currentWallpaper = { ...wp, currentFile: wp.images[0], isLive: false };
          } else if (wp.videos && wp.videos[0]) {
            currentWallpaper = { ...wp, currentFile: wp.videos[0], isLive: true };
          }
        }
      });
    }

    if (currentWallpaper) {
      const name = currentWallpaper.character || (currentWallpaper.isLive ? 'Live Wallpaper' : 'Wallpaper');
      wallpaperTitle.textContent = currentTitle || name;

      // Media wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'relative w-full flex justify-center items-center';

      if (currentWallpaper.isLive) {
        const video = document.createElement('video');
        video.src = currentWallpaper.currentFile.preview;
        video.removeAttribute("controls");
        video.controls = false;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.className = "max-h-[60vh] w-auto rounded-lg cursor-pointer";
        video.addEventListener('click', () => toggleFullscreen(video));
        previewBtn.addEventListener('click', () => toggleFullscreen(video));
        originalDownload.href = currentWallpaper.currentFile.download;
        originalDownload.download = `${name}.mp4`;
        document.getElementById('screenRes').textContent = `${screen.width}x${screen.height}`;
        autoDownloadResizeBtn.addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = currentWallpaper.currentFile.download;
          a.download = `${name}-${screen.width}x${screen.height}.mp4`;
          document.body.appendChild(a); a.click(); a.remove();
        });
        wrapper.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = currentWallpaper.currentFile.url;
        img.className = "w-full object-contain max-h-[60vh] rounded-lg cursor-pointer";
        img.addEventListener('click', () => toggleFullscreen(img));
        previewBtn.addEventListener('click', () => toggleFullscreen(img));
        originalDownload.href = currentWallpaper.currentFile.url;
        originalDownload.download = `${name}-original.webp`;
        document.getElementById('screenRes').textContent = `${screen.width}x${screen.height}`;
        autoDownloadResizeBtn.addEventListener('click', () => {
          resizeAndDownloadImage(currentWallpaper.currentFile.url, screen.width, screen.height, `${name}-${screen.width}x${screen.height}.webp`);
        });
        wrapper.appendChild(img);
      }

      previewWrapper.appendChild(wrapper);

      // Tags
      if (currentWallpaper.tags) {
        tagsContainer.innerHTML += currentWallpaper.tags.map(t =>
          `<span class="bg-gray-800 px-3 py-1 rounded-full">${t}</span>`).join('');
      }
    }

    /* -------------------------
       Likes & Views
    ------------------------- */
    const likeBtn = document.getElementById('likeBtn');
    const likeIcon = document.getElementById('likeIcon');
    const likeCountEl = document.getElementById('likeCount');
    const viewCountEl = document.getElementById('viewCount');

    if (currentWallpaper) {
      const characterName = currentWallpaper.character || currentTitle || 'Unknown';
      const uniqueId = currentUrl || currentTitle; // Use URL as unique identifier
      
      // Get or initialize wallpaper entry in centralized storage
      const wp = window.wallpaperStorage.getWallpaper(uniqueId, characterName);
      
      // Update views count
      const views = window.wallpaperStorage.updateViews(uniqueId);
      
      // Display initial data
      likeCountEl.textContent = formatNumber(wp.likes);
      viewCountEl.textContent = formatNumber(views);
      
      // Set like button state
      const userLiked = window.wallpaperStorage.getUserLiked(uniqueId);
      likeIcon.classList.toggle("fas", userLiked);
      likeIcon.classList.toggle("far", !userLiked);
      
      // Like button click handler
      likeBtn.addEventListener('click', () => {
        const isCurrentlyLiked = window.wallpaperStorage.getUserLiked(uniqueId);
        const newLikesCount = window.wallpaperStorage.updateLikes(uniqueId, isCurrentlyLiked ? -1 : 1);
        window.wallpaperStorage.setUserLiked(uniqueId, !isCurrentlyLiked);
        
        likeCountEl.textContent = formatNumber(newLikesCount);
        likeIcon.classList.toggle("fas");
        likeIcon.classList.toggle("far");
      });
    }
    if (currentWallpaper) {
      const name = currentWallpaper.character || (currentWallpaper.isLive ? 'Live Wallpaper' : 'Wallpaper');
      const pageTitle = `${name} | Free HD Anime Wallpapers - AmittoWallpapers`;
      const pageDesc = `Download ${name} in HD quality. Get free ${currentWallpaper.isLive ? 'live anime wallpapers' : 'anime wallpapers'} for desktop and mobile at AmittoWallpapers.`;

      // Update <title>
      document.title = pageTitle;

      // Update meta description
      let descMeta = document.querySelector('meta[name="description"]');
      if (!descMeta) {
        descMeta = document.createElement('meta');
        descMeta.setAttribute('name', 'description');
        document.head.appendChild(descMeta);
      }
      descMeta.setAttribute('content', pageDesc);

      // Update Open Graph (OG) tags
      let ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.setAttribute('content', pageTitle);

      let ogImage = document.querySelector('meta[property="og:image"]');
      if (ogImage) ogImage.setAttribute('content', currentWallpaper.isLive ? currentWallpaper.currentFile.preview : currentWallpaper.currentFile.url);

      let ogDesc = document.querySelector('meta[property="og:description"]');
      if (!ogDesc) {
        ogDesc = document.createElement('meta');
        ogDesc.setAttribute('property', 'og:description');
        document.head.appendChild(ogDesc);
      }
      ogDesc.setAttribute('content', pageDesc);
    } else {
      // Fallback: wallpaper not found
      const previewWrapper = document.getElementById('previewWrapper');
      const wallpaperTitle = document.getElementById('wallpaperTitle');
      wallpaperTitle.textContent = 'Wallpaper Not Found';
      previewWrapper.innerHTML = `
        <div class="flex flex-col items-center justify-center p-8 bg-gray-900 rounded-lg">
          <i class="fa-solid fa-exclamation-circle text-4xl text-yellow-500 mb-4"></i>
          <h2 class="text-xl font-semibold mb-2">Wallpaper Not Found</h2>
          <p class="text-gray-400 mb-4">The requested wallpaper could not be located.</p>
          <p class="text-sm text-gray-500 mb-4">Params: title="${currentTitle}", img="${currentUrl}"</p>
          <a href="index.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white">
            Back to Home
          </a>
        </div>
      `;
    }


    /* -------------------------
       Related Wallpapers
    ------------------------- */
    const relatedGrid = document.getElementById('relatedGrid');

    function renderCard(wp, grid) {
      const characterName = wp.character || 'Unknown';
      const uniqueId = wp.isVideo ? wp.preview : wp.url;
      const wpData = window.wallpaperStorage.getWallpaper(uniqueId, characterName);
      const likes = wpData.likes;
      const views = wpData.views;

      const card = document.createElement('div');
      card.className = "break-inside-avoid overflow-hidden rounded-xl bg-[#1a1a1a] shadow-lg mb-6";

      const mediaURL = wp.isVideo ? wp.preview : wp.url;
      const mediaHTML = wp.isVideo
        ? `<video loop muted playsinline class="wallpaper-img w-auto mx-auto ${wp.type === 'Mobile Live' ? 'h-56' : ''} rounded opacity-0 transition-opacity duration-500"><source src="${wp.preview}" type="video/mp4"></video>`
        : `<img loading="lazy" src="${wp.url}" alt="${wp.character}" class="wallpaper-img ${wp.type === 'Mobile' ? 'h-56' : 'h-72'} w-auto mx-auto rounded opacity-0 transition-opacity duration-500"/>`;

      card.innerHTML = `
    <a href="wallpaper.html?title=${encodeURIComponent(wp.character)}&img=${encodeURIComponent(mediaURL)}" target="_blank">
      <div class="relative group">
        <span class="absolute top-2 left-2 px-2 py-1 text-xs rounded-full text-white 
          ${wp.isVideo ? 'bg-yellow-500' : wp.type?.toLowerCase() === 'desktop' ? 'bg-red-600' : 'bg-green-600'}">
          ${wp.isVideo ? 'Live' : wp.type?.charAt(0).toUpperCase() + wp.type?.slice(1)}
        </span>
        <div class="loader-container absolute inset-0 flex items-center justify-center">
          <div class="loader"><div></div><div></div><div></div></div>
        </div>
        ${mediaHTML}
      </div>
    </a>
    <div class="flex justify-between items-center px-4 py-3 border-b border-gray-700">
      <div class="flex gap-2">
        <a href="${wp.download || wp.url}" download class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-white">
          <i class="fa-solid fa-download mr-1"></i>Download
        </a>
        <button class="likeBtn bg-green-600 px-3 py-1 rounded text-white flex items-center">
          <i class="likeIcon far fa-thumbs-up mr-1"></i>
          <span class="likeCount">${formatNumber(likes)}</span>
        </button>
      </div>
      <div class="text-xs text-gray-400">
        <i class="fa-solid fa-eye ml-1 mr-1"></i>${formatNumber(views)}
      </div>
    </div>
    <div class="px-4 py-4 flex flex-wrap gap-2 text-sm">
      <span class="font-bold"><i class="fa-solid fa-tags mr-1"></i>Tags:</span>
      ${(wp.tags || []).map(t => `<span class="bg-gray-800 px-3 py-1 rounded-full">${t}</span>`).join('')}
    </div>
  `;
      grid.appendChild(card);

      const media = card.querySelector('.wallpaper-img');
      const loader = card.querySelector('.loader-container');
      const likeBtn = card.querySelector('.likeBtn');
      const likeIcon = card.querySelector('.likeIcon');
      const likeCount = card.querySelector('.likeCount');
      
      if (wp.isVideo) {
        media.controls = false; // force disable
        media.addEventListener('loadeddata', () => {
          loader.style.display = 'none';
          media.classList.remove('opacity-0');
        });
        card.addEventListener('mouseenter', () => media.play());
        card.addEventListener('mouseleave', () => { media.pause(); media.currentTime = 0; });

      } else {
        media.addEventListener('load', () => {
          loader.style.display = 'none';
          media.classList.remove('opacity-0');
        });
      }

      // Set initial like state
      const isUserLiked = window.wallpaperStorage.getUserLiked(uniqueId);
      likeIcon.classList.toggle('fas', isUserLiked);
      likeIcon.classList.toggle('far', !isUserLiked);
      
      // Like button handler
      likeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const isCurrentlyLiked = window.wallpaperStorage.getUserLiked(uniqueId);
        const newLikesCount = window.wallpaperStorage.updateLikes(uniqueId, isCurrentlyLiked ? -1 : 1);
        window.wallpaperStorage.setUserLiked(uniqueId, !isCurrentlyLiked);
        
        likeCount.textContent = formatNumber(newLikesCount);
        likeIcon.classList.toggle('fas');
        likeIcon.classList.toggle('far');
      });
    }

    function renderRelatedWallpapers() {
      if (!currentWallpaper) return;
      const related = wallpapers.flatMap(wp => {
        let arr = [];
        if (wp.images) arr.push(...wp.images.map(img => ({ ...wp, url: img.url, isVideo: false })));
        if (wp.videos) arr.push(...wp.videos.map(v => ({ ...wp, url: v.preview, preview: v.preview, download: v.download, isVideo: true })));
        return arr;
      }).filter(item =>
        item.url !== currentUrl &&
        ((item.tags && currentWallpaper.tags?.some(t => item.tags.includes(t))) ||
          item.character === currentWallpaper.character)
      );
      const limited = related.sort(() => Math.random() - 0.5);
      if (!limited.length) relatedGrid.innerHTML = `<p class="text-gray-400">No related wallpapers found.</p>`;
      else limited.forEach(wp => renderCard(wp, relatedGrid));
    }

    renderRelatedWallpapers();

  </script>
  <script>
    function addImageSchema(url, name) {
      const schema = {
        "@context": "https://schema.org",
        "@type": "ImageObject",
        "contentUrl": url,
        "name": name + " Wallpaper",
        "license": "https://amittowallpapers.netlify.app/terms.html",
        "acquireLicensePage": "https://amittowallpapers.netlify.app/terms.html",
        "creator": {
          "@type": "Organization",
          "name": "AmittoWallpapers",
          "url": "https://amittowallpapers.netlify.app"
        },
        "creditText": "AmittoWallpapers",
        "copyrightNotice": "© 2025 AmittoWallpapers"
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.textContent = JSON.stringify(schema);
      document.head.appendChild(script);
    }

    // Example usage: call this with your wallpaper data
    addImageSchema(
      "https://amittowallpapers.netlify.app/images/goku-blue.jpg"
    );
        
  </script>
