<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/src/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --bg: #080810;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(201,169,110,0.2);
      --text: #f0ead8;
      --muted: rgba(240,234,216,0.45);
      --dim: rgba(240,234,216,0.25);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,169,110,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(100,120,200,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(180,120,80,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      padding: 2rem;
      text-align: center;
      animation: fadeUp 1s ease both;
    }

    /* Top ornament */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.1s both;
    }
    .ornament-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament-line:last-child {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .ornament-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }
    .ornament-text {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* Character */
    .char-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
      opacity: 0;
      animation: floatIn 1s ease 0.3s both;
    }
    .char-wrap::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.25) 0%, transparent 70%);
      filter: blur(6px);
    }
    .char-wrap img {
      width: 180px;
      filter: drop-shadow(0 8px 24px rgba(201,169,110,0.2));
      animation: float 4s ease-in-out infinite;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2.5rem 2rem;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--gold-light);
      margin-bottom: 0.75rem;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 1.25rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
      opacity: 0.4;
    }
    .divider span { flex: 1; height: 1px; background: var(--gold); }
    .divider i { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); }

    .quote {
      font-size: 0.99rem;
      color: var(--dim);
      font-style: italic;
      letter-spacing: 0.02em;
      line-height: 1.7;
    }
    .quote strong { color: var(--muted); font-style: normal; font-weight: 400; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 2rem;
      padding: 0.7rem 1.8rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--bg); }
    .btn span { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <main class="container">

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <span class="ornament-text">Under Construction</span>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>

    <div class="char-wrap">
      <img src="assets/images/comingsoon.gif" alt="Paimon" loading="lazy" />
    </div>

    <div class="card">
      <h1>Coming Soon</h1>
      <div class="divider"><span></span><i></i><span></span></div>

      <p class="quote">
        <strong>How about we explore the area ahead of us later?</strong><br/>
        This section of the site is still under development.<br/>
        Check back soon, Traveler.
      </p>

      <a href="./index.html" class="btn"><span>Return Home</span></a>
    </div>

  </main>
</body>
</html>
